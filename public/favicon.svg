<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
<title id="title">Portfolio Favicon</title>
<desc id="desc">Simplified abstract mark for small icon sizes</desc>
<style>
:root {
  --logo-accent: #7C3AED; /* violet-600 */
  --logo-accent-2: #22D3EE; /* cyan-300 */
}
</style>
<defs>
  <linearGradient id="accentGradient" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="var(--logo-accent,#7C3AED)"/>
    <stop offset="100%" stop-color="var(--logo-accent-2,#22D3EE)"/>
  </linearGradient>
  <filter id="s" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-opacity="0.2"/>
  </filter>
</defs>

<g transform="translate(32 32)" filter="url(#s)">
  <g fill="url(#accentGradient)">
    <rect x="-4" y="-20" width="8" height="40" rx="4"/>
    <rect x="-4" y="-20" width="8" height="40" rx="4" transform="rotate(60)"/>
    <rect x="-4" y="-20" width="8" height="40" rx="4" transform="rotate(120)"/>
  </g>
</g>
</svg>

